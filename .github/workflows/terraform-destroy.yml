name: Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to destroy'
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      confirm:
        description: 'Type "destroy" to confirm'
        required: true
        type: string

env:
  TF_VERSION: '1.6.0'
  LOCALSTACK_VERSION: '3.0'
  AWS_DEFAULT_REGION: 'us-east-1'
  AWS_ACCESS_KEY_ID: 'test'
  AWS_SECRET_ACCESS_KEY: 'test'
  AWS_ENDPOINT_URL: 'http://localhost:4566'

jobs:
  validate-destruction:
    name: Validate Destruction Request
    runs-on: ubuntu-latest
    outputs:
      confirmed: ${{ steps.check.outputs.confirmed }}
    
    steps:
      - name: Verificar confirmación
        id: check
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "destroy" ]; then
            echo "❌ Destruction not confirmed. You must type 'destroy' exactly."
            exit 1
          fi
          echo "confirmed=true" >> $GITHUB_OUTPUT

      - name: Seguridad para producción
        if: github.event.inputs.environment == 'prod'
        run: |
          echo "⚠️  WARNING: You are about to destroy PRODUCTION environment!"
          echo "This action will:"
          echo "  - Delete all containers"
          echo "  - Remove deployed applications"
          echo "  - Clean workspace state"
          sleep 10

  setup-localstack:
    name: Setup LocalStack
    runs-on: ubuntu-latest
    needs: validate-destruction
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Start LocalStack
        run: |
          docker run -d \
            --name localstack \
            -p 4566:4566 \
            -e SERVICES=s3,ec2,iam,lambda,cloudformation,logs,events \
            -e DEBUG=1 \
            -e PERSISTENCE=1 \
            -v /tmp/localstack:/var/lib/localstack \
            localstack/localstack:${{ env.LOCALSTACK_VERSION }}

      - name: Wait for LocalStack
        run: |
          chmod +x scripts/wait-for-localstack.sh
          ./scripts/wait-for-localstack.sh

      - name: Setup S3 Bucket
        run: |
          chmod +x scripts/setup-localstack.sh
          ./scripts/setup-localstack.sh

  destroy:
    name: Destroy Environment
    runs-on: ubuntu-latest
    needs: setup-localstack
    environment:
      name: ${{ github.event.inputs.environment }}-destroy
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="endpoints.s3=http://localhost:4566" \
            -backend-config="access_key=test" \
            -backend-config="secret_key=test"

      - name: Select Workspace
        run: |
          terraform workspace select ${{ github.event.inputs.environment }}

      - name: Backup Current State
        run: |
          terraform state pull > backup-${{ github.event.inputs.environment }}-$(date +%Y%m%d-%H%M%S).json
        continue-on-error: true

      - name: Upload State Backup
        uses: actions/upload-artifact@v4
        with:
          name: state-backup-${{ github.event.inputs.environment }}-${{ github.run_number }}
          path: semana-4/dia-27/backup-*.json
          retention-days: 30

      - name: Show Current Resources
        run: |
          echo "=== Resources to be destroyed ==="
          terraform state list

      - name: Terraform Destroy
        run: |
          terraform destroy \
            -var-file="environments/${{ github.event.inputs.environment }}.tfvars" \
            -auto-approve

      - name: Verify Destruction
        run: |
          echo "=== Remaining containers ==="
          docker ps --filter label=environment=${{ github.event.inputs.environment }} || echo "No containers found"
          
          echo -e "\n=== S3 State after destruction ==="
          aws --endpoint-url=http://localhost:4566 s3 ls s3://terraform-state-roxs/ || echo "Bucket empty or not found"

      - name: Delete Workspace
        run: |
          terraform workspace select default
          terraform workspace delete ${{ github.event.inputs.environment }}
        continue-on-error: true

      - name: Comment on Success
        if: success()
        run: |
          echo "✅ Environment ${{ github.event.inputs.environment }} successfully destroyed"
          echo "Backup saved as artifact: state-backup-${{ github.event.inputs.environment }}-${{ github.run_number }}"

  cleanup:
    name: Cleanup LocalStack
    runs-on: ubuntu-latest
    needs: destroy
    if: always()
    
    steps:
      - name: Stop LocalStack
        run: |
          docker logs localstack || true
          docker stop localstack || true
          docker rm localstack || true
          
      - name: Clean volumes
        run: |
          docker volume prune -f || true
